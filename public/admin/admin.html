<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/promotor/promotor.css"/>
  <link rel="stylesheet" href="/admin/admin.css"/>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen">
  <main class="auth-main">
    <div class="top-stripe"></div>
    <div class="logo-bar">
      <img src="/unicredit_logo.png" alt="UniCredit" style="height:30px;"/>
      <div class="logo-divider"></div>
      <img src="/f1_logo_red.png" alt="Formula 1" style="height:26px;"/>
    </div>
    <div class="auth-body">
      <div class="auth-eyebrow">Sistemski dostop</div>
      <div class="auth-title">Admin<span class="auth-title-red">Panel</span></div>
      <div class="auth-form">
        <div class="form-field">
          <label class="form-label">Uporabniško ime</label>
          <input id="login-username" class="form-input" type="text" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="form-field">
          <label class="form-label">Geslo</label>
          <input id="login-password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <span class="field-error" id="login-error"></span>
        <button class="submit-btn" id="login-btn" style="margin-top:16px;">
          Prijava <span class="btn-arrow"></span>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" style="display:none;">
  <div class="dash-header">
    <span class="dash-header-title">Admin</span>
    <div class="dash-header-right">
      <button class="dash-logout" id="logout-btn">Odjava</button>
    </div>
  </div>

  <!-- TAB: Admin -->
  <div id="tab-admin" class="tab-panel">
    <div class="dash-body">
      <section class="dash-section">
        <div class="dash-section-title">Statistika</div>
        <div class="stats-grid" id="stats-grid"></div>
      </section>
      <section class="dash-section">
        <div class="dash-section-title">Najboljši čas po dnevih</div>
        <div id="best-per-day-list" class="admin-table-wrap"></div>
      </section>
      <section class="dash-section">
        <div class="dash-section-title">Promotorji</div>
        <div id="promotors-list" class="admin-table-wrap" style="margin-bottom:16px;"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="add-promotor-btn" id="add-promotor-btn">+ Dodaj promotorja</button>
          <button class="add-promotor-btn" onclick="exportCsv()" style="background:transparent;border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;display:inline-block;vertical-align:middle;margin-right:5px;margin-bottom:1px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Izvozi kontakte (CSV)
          </button>
        </div>
      </section>
    </div>
  </div>

  <!-- TAB: Lestvice -->
  <div id="tab-lestvice" class="tab-panel" style="display:none;">
    <div class="dash-body">
      <section class="dash-section">
        <div class="dash-section-title">Dnevni top 5</div>
        <div id="lb-day-list"></div>
      </section>
      <section class="dash-section">
        <div class="dash-section-title">Skupni top 5</div>
        <div id="lb-all-list"></div>
      </section>
      <section class="dash-section" style="margin-bottom:0;">
        <div class="dash-section-title">Iskanje osebe</div>
        <div class="search-wrap">
          <input id="lb-search-input" class="form-input" type="text" placeholder="Vnesite ime ali priimek..."/>
          <button class="search-btn" id="lb-search-btn">Išči</button>
        </div>
        <div id="lb-search-results" style="margin-top:12px;"></div>
      </section>
    </div>
  </div>

  <!-- FOOTER TABS -->
  <nav class="dash-footer-tabs">
    <button class="footer-tab active" id="ftab-admin" onclick="adminSwitchTab('admin')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Pregled
    </button>
    <button class="footer-tab" id="ftab-lestvice" onclick="adminSwitchTab('lestvice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Lestvice
    </button>
  </nav>
</div>

<!-- ADD PROMOTOR MODAL -->
<div id="add-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Nov promotor</div>
    <div class="form-field" style="margin-top:16px;">
      <label class="form-label">Ime in priimek</label>
      <input id="new-name" class="form-input" type="text" placeholder="Ana Novak"/>
    </div>
    <div class="form-field">
      <label class="form-label">Uporabniško ime</label>
      <input id="new-username" class="form-input" type="text" placeholder="ana.novak"/>
    </div>
    <div class="form-field">
      <label class="form-label">Geslo</label>
      <input id="new-password" class="form-input" type="password" placeholder="••••••••"/>
    </div>
    <span class="field-error" id="add-error"></span>
    <div class="modal-actions">
      <button class="modal-cancel" id="add-cancel">Prekliči</button>
      <button class="submit-btn" id="add-save" style="flex:1;">Dodaj</button>
    </div>
  </div>
</div>

<script src="/shared/leaderboard.js"></script>
<script src="/admin/admin.js"></script>
</body>
</html>
