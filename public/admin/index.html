<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/promotor/promotor.css"/>
  <link rel="stylesheet" href="/admin/admin.css"/>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen">
  <main class="auth-main">
    <div class="top-stripe"></div>
    <div class="logo-bar">
      <img src="/unicredit_logo.png" alt="UniCredit" style="height:30px;"/>
      <div class="logo-divider"></div>
      <img src="/f1_logo_red.png" alt="Formula 1" style="height:26px;"/>
    </div>
    <div class="auth-body">
      <div class="auth-eyebrow">Sistemski dostop</div>
      <div class="auth-title">Admin<span class="auth-title-red">Panel</span></div>
      <div class="auth-form">
        <div class="form-field">
          <label class="form-label">Uporabniško ime</label>
          <input id="login-username" class="form-input" type="text" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="form-field">
          <label class="form-label">Geslo</label>
          <input id="login-password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <span class="field-error" id="login-error"></span>
        <button class="submit-btn" id="login-btn" style="margin-top:16px;">
          Prijava <span class="btn-arrow"></span>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" style="display:none;">
  <div class="dash-header">
    <div class="dash-header-left">
      <img src="/unicredit_logo.png" alt="UniCredit" style="height:24px; filter:brightness(0) invert(1);"/>
      <span class="dash-title">F1 Teden · Admin</span>
    </div>
    <div class="dash-header-right">
      <button class="dash-logout" id="logout-btn">Odjava</button>
    </div>
  </div>

  <div class="dash-body">
    <!-- Stats -->
    <section class="dash-section">
      <div class="dash-section-title">Statistika</div>
      <div class="stats-grid" id="stats-grid"></div>
    </section>

    <!-- Top 5 times -->
    <section class="dash-section">
      <div class="dash-section-title">Top 5 časov simulatorja</div>
      <div id="top5-list" class="admin-table-wrap"></div>
    </section>

    <!-- By promotor -->
    <section class="dash-section">
      <div class="dash-section-title">Časi po promotorju</div>
      <div id="by-promotor-list" class="admin-table-wrap"></div>
    </section>

    <!-- Promotors -->
    <section class="dash-section">
      <div class="dash-section-title">Promotorji</div>
      <div id="promotors-list" class="admin-table-wrap" style="margin-bottom:16px;"></div>
      <button class="add-promotor-btn" id="add-promotor-btn">+ Dodaj promotorja</button>
    </section>
  </div>
</div>

<!-- ADD PROMOTOR MODAL -->
<div id="add-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Nov promotor</div>
    <div class="form-field" style="margin-top:16px;">
      <label class="form-label">Ime in priimek</label>
      <input id="new-name" class="form-input" type="text" placeholder="Ana Novak"/>
    </div>
    <div class="form-field">
      <label class="form-label">Uporabniško ime</label>
      <input id="new-username" class="form-input" type="text" placeholder="ana.novak"/>
    </div>
    <div class="form-field">
      <label class="form-label">Geslo</label>
      <input id="new-password" class="form-input" type="password" placeholder="••••••••"/>
    </div>
    <span class="field-error" id="add-error"></span>
    <div class="modal-actions">
      <button class="modal-cancel" id="add-cancel">Prekliči</button>
      <button class="submit-btn" id="add-save" style="flex:1;">Dodaj</button>
    </div>
  </div>
</div>

<script src="/admin/admin.js"></script>
</body>
</html>
