<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/promotor/promotor.css"/>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen">
  <main class="auth-main">
    <div class="top-stripe"></div>
    <div class="logo-bar">
      <img src="/unicredit_logo.png" alt="UniCredit" style="height:30px;"/>
      <div class="logo-divider"></div>
      <img src="/f1_logo_red.png" alt="Formula 1" style="height:26px;"/>
    </div>
    <div class="auth-body">
      <div class="auth-eyebrow">Dostop za osebje</div>
      <div class="auth-title">Promotor<span class="auth-title-red">Login</span></div>
      <div class="auth-form">
        <div class="form-field">
          <label class="form-label">Uporabniško ime</label>
          <input id="login-username" class="form-input" type="text" placeholder="username" autocomplete="username"/>
        </div>
        <div class="form-field">
          <label class="form-label">Geslo</label>
          <input id="login-password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <span class="field-error" id="login-error"></span>
        <button class="submit-btn" id="login-btn" style="margin-top:16px;">
          Prijava <span class="btn-arrow"></span>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" style="display:none;">
  <div class="dash-header">
    <span class="dash-header-title">Promotor</span>
    <div class="dash-header-right">
      <span id="dash-username" class="dash-user"></span>
      <button class="dash-logout" id="logout-btn">Odjava</button>
    </div>
  </div>

  <!-- TAB: Prijave -->
  <div id="tab-prijave" class="tab-panel">
    <div class="dash-body">
      <section class="dash-section">
        <div class="dash-section-title">Zadnjih 5 prijav</div>
        <div id="recent-list" class="submission-list"></div>
      </section>
      <section class="dash-section">
        <div class="dash-section-title">Iskanje po imenu ali priimku</div>
        <div class="search-wrap">
          <input id="search-input" class="form-input" type="text" placeholder="Vnesite ime ali priimek..."/>
          <button class="search-btn" id="search-btn">Išči</button>
        </div>
        <div id="search-results" class="submission-list" style="margin-top:12px;"></div>
      </section>
    </div>
  </div>

  <!-- TAB: Lestvice -->
  <div id="tab-lestvice" class="tab-panel" style="display:none;">
    <div class="dash-body">
      <section class="dash-section">
        <div class="dash-section-title">Dnevni top 5</div>
        <div id="lb-day-list"></div>
      </section>
      <section class="dash-section">
        <div class="dash-section-title">Skupni top 5</div>
        <div id="lb-all-list"></div>
      </section>
      <section class="dash-section" style="margin-bottom:0;">
        <div class="dash-section-title">Iskanje osebe</div>
        <div class="search-wrap">
          <input id="lb-search-input" class="form-input" type="text" placeholder="Vnesite ime ali priimek..."/>
          <button class="search-btn" id="lb-search-btn">Išči</button>
        </div>
        <div id="lb-search-results" style="margin-top:12px;"></div>
      </section>
    </div>
  </div>

  <!-- FOOTER TABS -->
  <nav class="dash-footer-tabs">
    <button class="footer-tab active" id="ftab-prijave" onclick="switchTab('prijave')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Prijave
    </button>
    <button class="footer-tab" id="ftab-lestvice" onclick="switchTab('lestvice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Lestvice
    </button>
  </nav>
</div>

<!-- TIME MODAL -->
<div id="time-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Vpis časa simulatorja</div>
    <div id="modal-person" class="modal-person"></div>
    <div class="form-field" style="margin-top:16px;">
      <label class="form-label">Čas (mm:ss.ms)</label>
      <input id="modal-time" class="form-input" type="text" placeholder="01:23.456"/>
    </div>
    <span class="field-error" id="modal-error"></span>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel">Prekliči</button>
      <button class="submit-btn" id="modal-save" style="flex:1;">Shrani</button>
    </div>
  </div>
</div>

<script src="/shared/leaderboard.js"></script>
<script src="/promotor/promotor.js"></script>
</body>
</html>
